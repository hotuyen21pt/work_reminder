# Plan start date (YYYY-MM-DD) -> shows "Day N". Change to your real start date.
plan_start: "2026-07-20"

# Random quote API (English). On network error -> falls back to the built-in list in code.
quote_api: "https://zenquotes.io/api/random"

# Animated emoji sent with each reminder — one picked at random for variety.
# Only these 6 are supported by Telegram sendDice. Empty list = off.
dice:
  - "🎲"
  - "🎯"
  - "🏀"
  - "⚽"
  - "🎳"
  - "🎰"

# Emoji the bot reacts with on its own message (e.g. 🔥). Empty "" = off.
reaction: "🔥"

# Today's weather via Open-Meteo (free, no API key). Remove this block to turn off.
# Change lat/lon to your city (find them on Google / open-meteo.com).
weather:
  lat: 10.82          # Ho Chi Minh City
  lon: 106.63
  label: "Ho Chi Minh City"

groups:
  clinic-ops:
    chat_id: "-1004448791157"
    message_thread_id: ""

# One message per day (sent at 06:00 VN) covering the WHOLE day.
# Each day is split into Daytime and Afternoon & Evening, separated by a divider line.
reminders:
