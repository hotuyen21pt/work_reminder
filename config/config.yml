    group: "clinic-ops"
    photo: true
    text: |-
      🌅 <b>GOOD MORNING!</b>

      ☀️ <b>Daytime</b>
      <blockquote>🏋️ <code>06:30–07:30</code> Gym
      💼 <code>08:30–17:30</code> Work</blockquote>
