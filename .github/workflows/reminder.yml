name: telegram-reminder
on:
  schedule:
    # 06:00 giờ VN (UTC+7) = 23:00 UTC ngày trước. Field cuối là thứ trong tuần (0=CN, 1=T2..6=T7).
    - cron: "0 23 * * 0"   # Thứ 2 -> mon (VN 06:00)
    - cron: "0 23 * * 1"   # Thứ 3 -> tue (VN 06:00)
    - cron: "0 23 * * 2"   # Thứ 4 -> wed (VN 06:00)
    - cron: "0 23 * * 3"   # Thứ 5 -> thu (VN 06:00)
    - cron: "0 23 * * 4"   # Thứ 6 -> fri (VN 06:00)
    - cron: "0 23 * * 5"   # Thứ 7 -> sat (VN 06:00)
    - cron: "0 23 * * 6"   # Chủ nhật -> sun (VN 06:00)
  workflow_dispatch:        # bấm chạy tay để test
    inputs:
      reminder_name:
        description: "Tên reminder gửi thử (mon/tue/wed/thu/fri/sat/sun). Để trống = mon."
        required: false
        default: ""
jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Chọn reminder theo lịch cron
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "0 23 * * 0") echo "name=mon" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 1") echo "name=tue" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 2") echo "name=wed" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 3") echo "name=thu" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 4") echo "name=fri" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 5") echo "name=sat" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 6") echo "name=sun" >> "$GITHUB_OUTPUT" ;;
            *)           echo "name=" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Gửi reminder
        run: go run ./cmd
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          # Chạy tay -> dùng input; chạy theo lịch -> dùng tên map từ cron.
          REMINDER_NAME: ${{ github.event.inputs.reminder_name || steps.pick.outputs.name }}
