name: telegram-reminder
on:
  schedule:
    # Cron chạy theo UTC. VN = UTC+7. Field cuối là thứ trong tuần theo UTC (0=CN..6=T7).
    # Gửi 1 lần/ngày lúc 06:00 VN = 23:00 UTC NGÀY TRƯỚC (nên thứ trong cron lùi 1 ngày).
    - cron: "0 23 * * 0"   # (CN UTC) -> Thứ 2 VN 06:00 -> mon
    - cron: "0 23 * * 1"   # (T2 UTC) -> Thứ 3 VN 06:00 -> tue
    - cron: "0 23 * * 2"   # (T3 UTC) -> Thứ 4 VN 06:00 -> wed
    - cron: "0 23 * * 3"   # (T4 UTC) -> Thứ 5 VN 06:00 -> thu
    - cron: "0 23 * * 4"   # (T5 UTC) -> Thứ 6 VN 06:00 -> fri
    - cron: "0 23 * * 5"   # (T6 UTC) -> Thứ 7 VN 06:00 -> sat
    - cron: "0 23 * * 6"   # (T7 UTC) -> Chủ nhật VN 06:00 -> sun
  workflow_dispatch:        # bấm chạy tay để test
    inputs:
      reminder_name:
        description: "Tên reminder gửi thử (mon..sun). Để trống = mon."
        required: false
        default: ""
jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Chọn reminder theo lịch cron
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "0 23 * * 0") echo "name=mon" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 1") echo "name=tue" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 2") echo "name=wed" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 3") echo "name=thu" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 4") echo "name=fri" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 5") echo "name=sat" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 6") echo "name=sun" >> "$GITHUB_OUTPUT" ;;
            *)            echo "name=" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Gửi reminder
        run: go run ./cmd
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          # Chạy tay -> dùng input; chạy theo lịch -> dùng tên map từ cron.
          REMINDER_NAME: ${{ github.event.inputs.reminder_name || steps.pick.outputs.name }}
