name: build
on:
  push:            # chạy mỗi khi push code mới
  pull_request:    # và khi mở/cập nhật pull request
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true          # cache module để build nhanh hơn
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
